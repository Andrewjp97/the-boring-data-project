# Hand-maintained canonicalization for NHTSA make/model text (SPEC §2.1).
# Keys are matched after uppercasing + whitespace collapse.
# `makes`: alias -> canonical make (canonical need not be in vPIC; aliases are trusted).
# `models`: per-make model aliases.
# `display`: ALL-CAPS token -> preferred display form (applied to whole names
#            first, then per-word).

