# On push to main: quality gates -> container -> Cloud Run -> Hosting.
# Required Actions variables (see sync.yml for WIF setup):
#   GCP_PROJECT_ID, GCP_WIF_PROVIDER, GCP_DEPLOY_SA, SITE_URL
# Optional variables: PUBLIC_GA_ID, PUBLIC_ADS_ENABLED, PUBLIC_ADSENSE_CLIENT,
#   PUBLIC_AMAZON_TAG
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGION: us-central1
  SERVICE: recall-site

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
      - name: ETL gates (pytest, ruff, mypy)
        working-directory: etl
        run: |
          uv sync --frozen
          uv run ruff check src tests
          uv run mypy src
          uv run pytest -q
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Site gates (vitest, build)
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter site test
          pnpm --filter site build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build + push container (Artifact Registry)
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/site/${SERVICE}:${{ github.sha }}"
          # gcloud builds submit does not read --config from stdin; use a file.
          cat > "$RUNNER_TEMP/cloudbuild.yaml" <<EOF
          steps:
            - name: gcr.io/cloud-builders/docker
              args:
                - build
                - -f
                - site/Dockerfile
                - -t
                - $IMAGE
                - --build-arg
                - PUBLIC_GA_ID=${{ vars.PUBLIC_GA_ID }}
                - --build-arg
                - PUBLIC_ADS_ENABLED=${{ vars.PUBLIC_ADS_ENABLED || 'false' }}
                - --build-arg
                - PUBLIC_ADSENSE_CLIENT=${{ vars.PUBLIC_ADSENSE_CLIENT }}
                - --build-arg
                - PUBLIC_AMAZON_TAG=${{ vars.PUBLIC_AMAZON_TAG }}
                - --build-arg
                - SITE_URL=${{ vars.SITE_URL }}
                - .
          images: ["$IMAGE"]
          # Service accounts can't stream from the default logs bucket unless
          # they're project Viewer; without this, gcloud exits 1 while the
          # build is still running (logs stay in Cloud Logging).
          options:
            logging: CLOUD_LOGGING_ONLY
          EOF
          gcloud builds submit . \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --config "$RUNNER_TEMP/cloudbuild.yaml"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "$REGION" \
            --image "$IMAGE" \
            --min-instances 0 --max-instances 3 \
            --concurrency 80 --memory 512Mi \
            --set-env-vars "GCP_PROJECT=${{ vars.GCP_PROJECT_ID }},SITE_URL=${{ vars.SITE_URL }}" \
            --allow-unauthenticated

      # A Hosting release is a FULL snapshot: anything missing from
      # public-deploy disappears from the live site. Sitemaps, the search
      # index, and the real robots.txt are produced by the weekly sync
      # (gitignored, not in this checkout), so mirror the live copies into
      # the snapshot — otherwise every code deploy wipes them until the
      # next Monday sync.
      - name: Assemble Hosting public dir
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          rm -rf site/public-deploy
          cp -r site/public site/public-deploy
          # robots.txt must carry the real SITE_URL (the committed file is a placeholder)
          printf 'User-agent: *\nAllow: /\nDisallow: /vin/\n\nSitemap: %s/sitemaps/sitemap-index.xml\n' "$SITE_URL" \
            > site/public-deploy/robots.txt
          # mirror <url> <dest>: 0 = fetched, 1 = 404 (expected pre-first-sync),
          # 2 = anything else. Only 404 may be tolerated — deploying without a
          # file that exists live would wipe it (full-snapshot release), so a
          # transient network/5xx error must fail the deploy, not skip the file.
          mirror() {
            local code
            code=$(curl -sSL -o "$2" -w '%{http_code}' "$1") || { rm -f "$2"; echo "::error::fetch $1 failed (network)"; return 2; }
            [ "$code" = "200" ] && return 0
            rm -f "$2"
            [ "$code" = "404" ] && return 1
            echo "::error::fetch $1 returned HTTP $code"
            return 2
          }
          mkdir -p site/public-deploy/sitemaps
          if mirror "$SITE_URL/sitemaps/sitemap-index.xml" site/public-deploy/sitemaps/sitemap-index.xml; then
            for f in $(grep -o 'sitemap-[0-9]*\.xml' site/public-deploy/sitemaps/sitemap-index.xml | sort -u); do
              # a shard the index references must exist — abort rather than
              # publish an index pointing at 404s
              mirror "$SITE_URL/sitemaps/$f" "site/public-deploy/sitemaps/$f" || exit 1
            done
          else
            [ "$?" = "1" ] || exit 1
            echo "no live sitemap index (404, pre-first-sync) — nothing to mirror"
          fi
          mirror "$SITE_URL/search-index.json" site/public-deploy/search-index.json || { [ "$?" = "1" ] || exit 1; }

      - name: Deploy Hosting
        run: npx --yes firebase-tools@latest deploy --only hosting,firestore:rules --project "${{ vars.GCP_PROJECT_ID }}" --non-interactive
